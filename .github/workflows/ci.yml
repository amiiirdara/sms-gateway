name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: vet + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test (unit, skip testcontainers)
        run: go test ./... -short -count=1
