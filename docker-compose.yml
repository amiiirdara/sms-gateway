name: sms-gateway

x-go-service: &go-service
  build:
    context: .
    dockerfile: deploy/docker/Dockerfile
  environment: &go-env
    DATABASE_URL: postgres://sms:sms@postgres:5432/sms_gateway?sslmode=disable
    REDIS_ADDR: redis:6379
    KAFKA_BROKERS: kafka:9092
    CLICKHOUSE_ADDR: clickhouse:9000
    CLICKHOUSE_PASSWORD: sms
    HTTP_ADDR: ":8080"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_started
    clickhouse:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: sms
      POSTGRES_PASSWORD: sms
      POSTGRES_DB: sms_gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms -d sms_gateway"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Single-node KRaft (no ZooKeeper) Kafka broker - fine for local dev; see
  # ARCHITECTURE.md section 13 for production notes (multi-broker cluster).
  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: sms_gateway
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: sms
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      # Prefer clickhouse-client over wget-to-localhost: alpine resolves
      # localhost to ::1, but this image listens on IPv4 only under Docker Desktop.
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations
    command:
      [
        "-path=/migrations",
        "-database=postgres://sms:sms@postgres:5432/sms_gateway?sslmode=disable",
        "up",
      ]
    restart: "no"

  operator-mock:
    <<: *go-service
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: operator-mock
    environment:
      <<: *go-env
      HTTP_ADDR: ":8080"
      OPERATOR_MOCK_FAILURE_RATE: "0.02"

  api-gateway:
    <<: *go-service
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: api-gateway
    ports:
      - "8080:8080"

  reporting-api:
    <<: *go-service
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: reporting-api
    ports:
      - "8081:8080"

  outbox-relay:
    <<: *go-service
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: outbox-relay

  campaign-expander:
    <<: *go-service
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: campaign-expander

  dispatcher-normal:
    <<: *go-service
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: dispatcher
    command: ["--mode=normal"]
    environment:
      <<: *go-env
      OPERATOR_URL: http://operator-mock:8080

  dispatcher-express:
    <<: *go-service
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: dispatcher
    command: ["--mode=express"]
    environment:
      <<: *go-env
      OPERATOR_URL: http://operator-mock:8080

  report-sink:
    <<: *go-service
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: report-sink

  billing-consumer:
    <<: *go-service
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: billing-consumer

  reconciler:
    <<: *go-service
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: reconciler

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  clickhouse_data:
